## ──────────────────────────────────────────────────────────────────
## AI-CASB SECURED CONFIG — BACKUP
## Copy this file to ~/.continue/config.yaml when starting CASB.
## All traffic routes through localhost:4000 (the CASB proxy).
## ──────────────────────────────────────────────────────────────────
name: CASB Secured Config
version: 1.0.0
schema: v1
models:
  # ── OpenRouter Cloud Models (Free Tier) ──
  - name: 🛡️ CASB (Gemma 4 26B)
    provider: openai
    model: openrouter/google/gemma-4-26b-a4b:free
    apiBase: http://localhost:4000/v1
    apiKey: TestAccount
  - name: 🛡️ CASB (Gemma 4 31B)
    provider: openai
    model: openrouter/google/gemma-4-31b:free
    apiBase: http://localhost:4000/v1
    apiKey: TestAccount
  - name: 🛡️ CASB (Nemotron 3 Super)
    provider: openai
    model: openrouter/nvidia/nemotron-3-super:free
    apiBase: http://localhost:4000/v1
    apiKey: TestAccount
  - name: 🛡️ CASB (MiniMax M2.5)
    provider: openai
    model: openrouter/minimax/minimax-m2.5:free
    apiBase: http://localhost:4000/v1
    apiKey: TestAccount
  - name: 🛡️ CASB (Trinity Large)
    provider: openai
    model: openrouter/arcee-ai/trinity-large-preview:free
    apiBase: http://localhost:4000/v1
    apiKey: TestAccount
  - name: 🛡️ CASB (Qwen3 Coder 480B)
    provider: openai
    model: openrouter/qwen/qwen3-coder-480b-a35b:free
    apiBase: http://localhost:4000/v1
