# ============================================================================
# AI-CASB Behavioral Detection — Splunk Saved Searches
# ============================================================================
# These scheduled searches implement behavioral pattern detection for the
# AI-CASB security gateway. When triggered, they call the casb_iris_alert.py
# script to create IRIS case management tickets with MITRE ATT&CK + ATLAS tags.
#
# Deploy to: /opt/splunk/etc/apps/search/local/savedsearches.conf
# ============================================================================

# ── Pattern 1: Brute Force Probing ───────────────────────────────────────────
# Detects: 3+ blocked prompts from the same user within 5 minutes.
# Severity: HIGH
# MITRE: T1190, T1059, AML.T0051, AML.T0054
[CASB_Brute_Force_Detection]
search = index=casb_gateway action="dlp_block" earliest=-5m latest=now | stats count as block_count values(rule) as rules values(prompt_preview) as prompts by user | where block_count >= 3
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
enableSched = 1
alert.track = 1
alert.suppress = 1
alert.suppress.period = 10m
alert.suppress.fields = user
counttype = number of results
quantity = 0
relation = greater than
action.script = 1
action.script.filename = casb_iris_alert.py
description = Detects brute force prompt injection: 3+ blocks from same user in 5 min. MITRE: T1190, AML.T0051.
alert.severity = 4

# ── Pattern 2: Probe → Strike ────────────────────────────────────────────────
# Detects: 2+ flagged (allowed) probes + 1+ block from same user in 10 min.
# Severity: HIGH
# MITRE: T1190, T1078, AML.T0051, AML.T0040
[CASB_Probe_Strike_Detection]
search = index=casb_gateway action IN ("dlp_block", "dlp_flagged") earliest=-10m latest=now | stats count(eval(action="dlp_block")) as blocks count(eval(action="dlp_flagged")) as flags values(rule) as rules values(prompt_preview) as prompts by user | where blocks >= 1 AND flags >= 2
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
enableSched = 1
alert.track = 1
alert.suppress = 1
alert.suppress.period = 15m
alert.suppress.fields = user
counttype = number of results
quantity = 0
relation = greater than
action.script = 1
action.script.filename = casb_iris_alert.py
description = Detects probe-to-strike pattern: 2+ flagged probes then 1+ block in 10 min. MITRE: T1190, T1078, AML.T0040.
alert.severity = 4

# ── Pattern 3: Slow Data Exfiltration ────────────────────────────────────────
# Detects: 5+ flagged (allowed) prompts from same user in 15 min, no blocks.
# Severity: MEDIUM
# MITRE: T1048, T1530, AML.T0048.002, AML.T0043
[CASB_Slow_Exfil_Detection]
search = index=casb_gateway action="dlp_flagged" earliest=-15m latest=now | stats count as flag_count values(rule) as rules values(prompt_preview) as prompts by user | where flag_count >= 5
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
enableSched = 1
alert.track = 1
alert.suppress = 1
alert.suppress.period = 20m
alert.suppress.fields = user
counttype = number of results
quantity = 0
relation = greater than
action.script = 1
action.script.filename = casb_iris_alert.py
description = Detects slow exfiltration: 5+ flagged prompts in 15 min without blocks. MITRE: T1048, AML.T0048.002.
alert.severity = 3
