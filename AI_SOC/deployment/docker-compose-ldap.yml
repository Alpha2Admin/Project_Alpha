version: '3.8'

services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: casb-ldap
    environment:
      LDAP_ORGANISATION: "AI-CASB Security"
      LDAP_DOMAIN: "casb.local"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD:-CHANGE_ME}"
      LDAP_CONFIG_PASSWORD: "${LDAP_CONFIG_PASSWORD:-CHANGE_ME}"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    networks:
      - casb-net

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: casb-ldap-admin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8081:80"
    depends_on:
      - openldap
    networks:
      - casb-net

networks:
  casb-net:
    external: true

volumes:
  ldap_data:
  ldap_config:
